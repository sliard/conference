title: DevFest Perros-Guirec
description: >- # this means to ignore newlines until "baseurl:"
  Le DevFest Perros-Guirec est une conférence à destination des développeu.se.r.s organisée par l'association Code d'Armor.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com



# Build settings
plugins:
  - jekyll_asset_pipeline

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will not be copied to _site.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - .github/
  - README.md
  - scripts/
  # Performance: Exclude old event assets from build (kept in repo for reference)
  # These large directories significantly slow down build time
  - assets/2021/
  - assets/2022/
  - assets/2023/
  - assets/2024/
  - assets/slidedecks/
  # Exclude development/test files
  - .playwright/
  - "*.log"
  - node_modules/
  - vendor/
  - Dockerfile
  - docker-compose.yml

# Include only current year assets for faster builds
# Note: Previous year assets can be served from external storage/CDN

sass:
  style: compressed # Minify CSS output

asset_pipeline:
  bundle: true
  compress: true
  output_path: assets
  display_path: nil
  gzip: true # Enable gzip compression for assets

# Compression settings for Jekyll
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  startings: [html, head, body]

# Performance: Lazy loading settings
lazy_loading:
  enabled: true
  placeholder: data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E
