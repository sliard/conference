<!-- CTA Finale -->
<section class="cta-finale">
  <div class="reveal">
    <span class="eyebrow" style="color:#FF2E83;">Rendez-vous le {{ page.Details.when.date }}</span>
    <h2>Prêt·e à coder moins<br>et penser plus ?</h2>
    <div class="btn-row" style="justify-content:center;">
      {% if page.Register %}
      <a href="#billetterie" class="btn btn-magenta">Acheter mon billet</a>

      {% if page.CallForProposal %}
      <a href="{{ page.CallForProposal.cfp_url }}" class="btn btn-outline" target="_blank" rel="noopener">Appel à speakers</a>
      {% endif %}
    </div>
  </div>
</section>
