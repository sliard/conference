<section class="call-for-proposal" class="section-padding">
    {% assign callForProposal = include.params %}

    {% if callForProposal %}
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="section-title-header text-center">
                    <h2 class="section-title wow fadeInUp" data-wow-delay="0.2s">{{ callForProposal.title }}</h2>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-2 d-none-lg"> </div>
            <div class="col-8">

                <p class="" data-wow-delay="0.2s">{{ callForProposal.cfp_description }}
                </p>

                <p class="text-center m-4"><a class="btn btn-primary" href="{{ callForProposal.cfp_url }}"
                        target="_blank">{{ callForProposal.cfp_button_text }}</a></p>

            </div>
            <div class="col-2 d-none-lg"> </div>
        </div>
        {% endif %}
</section>
