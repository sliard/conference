<!DOCTYPE html>
<html lang="fr">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

   <!-- Open Graph Meta Tags -->
   <meta property="og:title" content="{{page.title}}">
   <meta property="og:description" content="{{page.description}}">
   <meta property="og:image" content="{{site.baseurl}}{{page.thumbnail_url}}">
   <meta property="og:url" content="{{site.baseurl}}">
   <meta property="og:type" content="website">
   <meta property="og:site_name" content="{{page.title}}">

   <!-- Twitter Card Meta Tags -->
   <meta name="twitter:card" content="summary_large_image">
   <meta name="twitter:title" content="{{page.title}}">
   <meta name="twitter:description" content="{{page.description}}">
   <meta name="twitter:image" content="{{site.baseurl}}{{page.thumbnail_url}}">

  <title>{{ page.title}}</title>

  <link rel="apple-touch-icon" sizes="180x180" href="{{site.baseurl}}/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="{{site.baseurl}}/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{site.baseurl}}/favicon-16x16.png">
  <link rel="manifest" href="{{site.baseurl}}/site.webmanifest">
  <link rel="mask-icon" href="{{site.baseurl}}/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">

  <!-- Resource Hints for Performance -->
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Critical CSS - Inline above-the-fold styles -->
  <style>
    /* Critical CSS for initial render */
    *,*::before,*::after{box-sizing:border-box}
    html{overflow-x:hidden;font-family:sans-serif;line-height:1.15;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;-ms-overflow-style:scrollbar;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:'Lato',sans-serif;font-size:15px;font-weight:400;line-height:25px;color:#212121;background-color:#fff;overflow-x:hidden}
    h1,h2,h3,h4{margin-top:0;margin-bottom:.5rem;font-family:'Josefin Sans',sans-serif;font-weight:700;line-height:1.2}
    h1{font-size:2.5rem}
    h2{font-size:2rem}
    p{margin-top:0;margin-bottom:1rem}
    a{color:#E91E63;text-decoration:none;background-color:transparent;-webkit-text-decoration-skip:objects}
    img{vertical-align:middle;border-style:none;max-width:100%;height:auto}
    .container{width:100%;padding-right:15px;padding-left:15px;margin-right:auto;margin-left:auto}
    @media(min-width:576px){.container{max-width:540px}}
    @media(min-width:768px){.container{max-width:720px}}
    @media(min-width:992px){.container{max-width:960px}}
    @media(min-width:1200px){.container{max-width:1140px}}
    .row{display:flex;flex-wrap:wrap;margin-right:-15px;margin-left:-15px}
    .col-12,.col-lg-4,.col-lg-8,.col-md-6{position:relative;width:100%;min-height:1px;padding-right:15px;padding-left:15px}
    .col-12{flex:0 0 100%;max-width:100%}
    @media(min-width:992px){.col-lg-4{flex:0 0 33.333333%;max-width:33.333333%}.col-lg-8{flex:0 0 66.666667%;max-width:66.666667%}}
    .text-center{text-align:center!important}
    .d-none{display:none!important}
    #header-wrap{position:relative;width:100%}
    .carousel{position:relative}
    .carousel-inner{position:relative;width:100%;overflow:hidden}
    .carousel-item{position:relative;display:none;align-items:center;width:100%;transition:transform .6s ease;backface-visibility:hidden;perspective:1000px}
    .carousel-item.active{display:block}
    .carousel-item-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1}
    .carousel-caption{position:absolute;right:15%;bottom:20px;left:15%;z-index:10;padding-top:20px;padding-bottom:20px;color:#fff;text-align:center}
    .btn{display:inline-block;font-weight:400;text-align:center;white-space:nowrap;vertical-align:middle;user-select:none;border:1px solid transparent;padding:.375rem .75rem;font-size:1rem;line-height:1.5;border-radius:.25rem;transition:all .15s ease-in-out}
    .btn-primary{color:#fff;background-color:#E91E63;border-color:#E91E63}
    .section-title{font-size:36px;color:#212121;line-height:52px;padding-bottom:20px;font-weight:700;text-align:center;position:relative;margin-bottom:15px}
    .section-padding{padding:30px 0}
    #preloader{position:fixed;background:#fff;top:0;left:0;width:100%;height:100%;z-index:9999999999}
    .sk-circle{margin:0 auto;width:40px;height:40px;top:45%;position:relative}
    .sk-circle .sk-child{width:100%;height:100%;position:absolute;left:0;top:0}
    .sk-circle .sk-child:before{content:'';display:block;margin:0 auto;width:15%;height:15%;background-color:#E91E63;border-radius:100%;animation:sk-circleBounceDelay 1.2s infinite ease-in-out both}
    @keyframes sk-circleBounceDelay{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
    .img-fluid{max-width:100%;height:auto}
    .back-to-top{display:none;position:fixed;bottom:18px;right:15px;text-decoration:none}
    /* Reduced motion for accessibility */
    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
  </style>

  <!-- Non-critical CSS loaded asynchronously -->
  <link rel="preload" href="{{site.baseurl}}/assets/css/bootstrap.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="{{site.baseurl}}/assets/css/bootstrap.min.css"></noscript>

  <link rel="preload" href="{{site.baseurl}}/assets/fonts/line-icons.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="{{site.baseurl}}/assets/fonts/line-icons.css"></noscript>

  <link rel="preload" href="{{site.baseurl}}/assets/css/slicknav.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="{{site.baseurl}}/assets/css/slicknav.css"></noscript>

  <link rel="preload" href="{{site.baseurl}}/assets/css/nivo-lightbox.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="{{site.baseurl}}/assets/css/nivo-lightbox.css"></noscript>

  <link rel="preload" href="{{site.baseurl}}/assets/css/animate.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="{{site.baseurl}}/assets/css/animate.css"></noscript>

  <link rel="preload" href="{{site.baseurl}}/assets/css/main.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="{{site.baseurl}}/assets/css/main.css"></noscript>

  <link rel="preload" href="{{site.baseurl}}/assets/css/responsive.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="{{site.baseurl}}/assets/css/responsive.css"></noscript>

  <!-- Icons - Async load -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"></noscript>

  <!-- Google Fonts - Async load -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

</head>

<body>

  <!-- Header Area wrapper Starts -->
  <header id="header-wrap">
    {% include menu.html %}
  </header>
  <!-- Header Area wrapper End -->
